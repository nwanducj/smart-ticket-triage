# =============================================================================
# Render Blueprint — Smart Triage
#
# Defines two web services (backend + frontend) that deploy independently from
# a single repo. Push this file to the repo root, then on Render:
#
#   New + → Blueprint → connect this repo → apply.
#
# Render will create both services and wire them up. You only need to supply
# the secrets marked `sync: false` below (MONGODB_URI, JWT_SECRET, etc.).
#
# Notes:
#   - Each service runs its own Dockerfile (root dir set per-service).
#   - The frontend passes NEXT_PUBLIC_API_URL as a Docker BUILD argument,
#     not a runtime env var. Next.js bakes NEXT_PUBLIC_* into the client
#     bundle at build time, so it must be set on the build, not the process.
#   - The backend reads PORT from the env — Render injects it automatically.
#   - Health checks hit /api/health (backend) and / (frontend).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  - type: web
    name: smart-triage-backend
    runtime: docker
    plan: free # upgrade to starter+ for no cold starts
    region: oregon # change to your preferred region
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # MongoDB connection — set this in the Render dashboard (sync: false
      # means "don't commit the real value, prompt me on apply").
      - key: MONGODB_URI
        sync: false

      # JWT signing secret. Generate with: openssl rand -base64 48
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 8h

      # CORS origin — the public URL of the frontend service below.
      # After the first deploy, copy the frontend's .onrender.com URL into
      # this value. (Render can't cross-reference service URLs at blueprint
      # time, so this is a manual one-time paste.)
      - key: FRONTEND_URL
        sync: false

      # Anthropic / LLM config.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-sonnet-4-20250514
      - key: LLM_MOCK
        value: "false"
      - key: LLM_TIMEOUT_MS
        value: "15000"
      - key: LLM_MAX_RETRIES
        value: "2"

  # ---------------------------------------------------------------------------
  # Frontend (Next.js, standalone output)
  # ---------------------------------------------------------------------------
  - type: web
    name: smart-triage-frontend
    runtime: docker
    plan: free
    region: oregon
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /

    # Runtime env vars only. NEXT_PUBLIC_API_URL is consumed at BUILD time
    # by Next.js (NEXT_PUBLIC_* is inlined into the browser bundle), so it
    # must be set as a Docker Build Argument in the Render DASHBOARD:
    #
    #   Frontend service → Settings → Docker Build Environment →
    #     NEXT_PUBLIC_API_URL = https://<backend>.onrender.com/api
    #
    # Then trigger a manual deploy. Build-arg changes don't auto-rebuild.
    # (render.yaml's schema has no field for docker build args — that's why
    # `dockerBuildArgs:` failed validation.)
    envVars:
      - key: NODE_ENV
        value: production
